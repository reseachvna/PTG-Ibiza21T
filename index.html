<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Tính Giá Flamingo Ibiza Party Resort</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; line-height: 1.6; margin: 0; padding: 20px;}
        .container { max-width: 1200px; margin: 10px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; text-transform: uppercase; margin-bottom: 5px; font-size: 26px; text-align: center;}
        h2 { color: #d53f8c; font-weight: bold; margin-top: 0; margin-bottom: 30px; font-size: 20px; text-align: center;}
        #data-status { font-weight: bold; margin-bottom: 25px; padding: 10px; border-radius: 6px; display: inline-block; background: #f1f5f9; text-align: center;}
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: left; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #4a5568; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; outline: none; transition: 0.2s; }
        .full-width { grid-column: span 3; }
        .mode-selector { background: #edf2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 30px; align-items: center; justify-content: center; }
        .mode-selector label { cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .custom-discount-box { background: #fffaf0; border: 1px dashed #ed8936; padding: 20px; border-radius: 8px; margin-top: 10px; display: none; }
        .extra-discount-container { background: #ebf8ff; border: 1px dashed #3182ce; padding: 20px; border-radius: 8px; margin-top: 10px; }
        .custom-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .custom-table th { font-size: 14px; color: #4a5568; padding-bottom: 8px; }
        .custom-table input, .custom-table select { width: 95%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .btn-add { background: #2b6cb0; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-remove { background: #e53e3e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-main { background: #d53f8c; color: white; border: none; padding: 18px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-main:hover { background: #b83280; transform: translateY(-2px); }
        .btn-print, .btn-next { padding: 10px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; color: white; }
        .btn-print { background: #38a169; }
        .btn-next { background: #2b6cb0; }
        .print-header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-buttons { display: flex; gap: 10px; }
        #result-box { display: none; margin-top: 40px; padding-top: 30px; border-top: 2px solid #edf2f7; text-align: left; }
        .info-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 25px; }
        .info-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 5px; align-items: center;}
        .price-highlight { background: #fff5f5; padding: 20px; border-radius: 8px; border: 1px solid #feb2b2; margin-bottom: 30px; }
        .final-price-container { border-top: 1px dashed #fc8181; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 15px; border-radius: 6px; }
        .final-price { color: #e53e3e; font-size: 20px; font-weight: bold; }
        table.schedule-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        .schedule-table th { background: #1a365d; color: white; padding: 12px; border: 1px solid #1a365d; text-align: center; font-size: 14px;}
        .schedule-table td { border: 1px solid #cbd5e0; padding: 12px; font-size: 14px;}
        .handover-note { color: #d53f8c; font-weight: bold; display: block; margin-top: 4px; font-style: italic; }
        @media print { .no-print { display: none !important; } .container { box-shadow: none; padding: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center;" class="no-print">
        <h1>Bảng tính giá & Tiến độ thanh toán</h1>
        <h2>Flamingo Ibiza Party Resort</h2>
        <div id="data-status">⏳ Đang tải dữ liệu sản phẩm...</div>
    </div>
    <div class="mode-selector no-print">
        <label><input type="radio" name="calc-mode" value="auto" checked onchange="toggleMode()"> TÍNH TỰ ĐỘNG</label>
        <label><input type="radio" name="calc-mode" value="custom" onchange="toggleMode()"> TÙY CHỈNH</label>
    </div>
    <div class="form-grid no-print">
        <div class="form-group"><label>Tên khách hàng</label><input type="text" id="fullname"></div>
        <div class="form-group"><label>Mã sản phẩm</label><input type="text" id="apt-code"></div>
        <div class="form-group"><label>Ngày đặt cọc</label><input type="date" id="deposit-date"></div>
        <div class="form-group full-width">
            <label>Phương thức thanh toán</label>
            <select id="payment-plan">
                <option value="36">Tiến độ chuẩn 36 tháng</option>
                <option value="12">Thanh toán trong 12 tháng (CK 7.5%)</option>
                <option value="30">Thanh toán nhanh trong 30 ngày (CK 12%)</option>
            </select>
        </div>
        <div class="form-group full-width no-print" id="auto-extra-discount-box">
            <div class="extra-discount-container">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="enable-extra" onchange="toggleExtraDetails()"> <strong>Chiết khấu bổ sung (Lũy kế)</strong>
                </label>
                <div id="extra-details-area" style="display: none; margin-top:15px;">
                    <table class="custom-table"><tbody id="extra-body"></tbody></table>
                    <button class="btn-add" onclick="addExtraRow()">+ Thêm chiết khấu</button>
                </div>
            </div>
        </div>
    </div>
    <div id="custom-discount-box" class="custom-discount-box no-print">
        <table class="custom-table"><tbody id="custom-body"></tbody></table>
        <button class="btn-add" onclick="addCustomRow()">+ Thêm dòng chiết khấu</button>
    </div>
    <button class="btn-main no-print" onclick="calculate()">TẠO PHIẾU TÍNH GIÁ</button>
    <div id="result-box">
        <div class="print-header-actions">
            <h3 style="color:#1a365d">CHI TIẾT PHIẾU TÍNH GIÁ</h3>
            <div class="action-buttons no-print">
                <button class="btn-print" onclick="window.print()">IN PHIẾU</button>
                <button id="btn-goto-index2" class="btn-next" style="display: none;" onclick="transferToIndex2()">DÒNG THU BÁN PHÒNG & ROI →</button>
            </div>
        </div>
        <div class="info-grid-2col">
            <div class="info-col">
                <div class="info-item"><span>Khách hàng:</span> <strong id="out-name"></strong></div>
                <div class="info-item"><span>Mã căn:</span> <strong id="out-code"></strong></div>
            </div>
            <div class="info-col">
                <div class="info-item"><span>Diện tích:</span> <strong><span id="out-area"></span> m2</strong></div>
                <div class="info-item"><span>Giá bán niêm yết:</span> <strong id="out-price-total"></strong></div>
            </div>
        </div>
        <div class="price-highlight">
            <div id="discount-breakdown"></div>
            <div class="final-price-container"><span>GIÁ BÁN SAU CHIẾT KHẤU:</span><span class="final-price" id="out-price-final"></span></div>
        </div>
        <div id="schedule-content"></div>
    </div>
</div>
<script>
    let masterData = [];
    let handoverInfo = { month: 11, year: 2026, gapToGCN: 6 }; 

    function cleanAndParsePrice(val) {
        if (!val) return 0;
        return Number(String(val).replace(/[^0-9]/g, '')) || 0;
    }

    function initApp() {
        const today = new Date();
        document.getElementById('deposit-date').valueAsDate = today;
        fetch('Data.json').then(res => res.json()).then(data => {
            masterData = Array.isArray(data) ? data : data[Object.keys(data)[0]];
            document.getElementById('data-status').innerHTML = "🟢 Dữ liệu sẵn sàng!";
            
            // Tự động khôi phục dữ liệu nếu khách hàng bấm "Quay lại" từ Index2
            restoreState();
        });
    }
    initApp();

    function handleExTypeChange(el) {
        const baseSelect = el.closest('tr').querySelector('.ex-base');
        if (el.value === 'amount') { baseSelect.value = 'after-vat'; baseSelect.disabled = true; } 
        else { baseSelect.disabled = false; }
    }

    function toggleMode() {
        const m = document.querySelector('input[name="calc-mode"]:checked').value;
        document.getElementById('custom-discount-box').style.display = (m === 'custom' ? 'block' : 'none');
        document.getElementById('auto-extra-discount-box').style.display = (m === 'auto' ? 'block' : 'none');
    }
    function toggleExtraDetails() {
        document.getElementById('extra-details-area').style.display = document.getElementById('enable-extra').checked ? 'block' : 'none';
    }
    function addExtraRow() {
        const row = `<tr><td><select class="ex-type" onchange="handleExTypeChange(this)"><option value="percent">Tỷ lệ (%)</option><option value="amount">Tiền (VNĐ)</option></select></td><td><select class="ex-base"><option value="after-vat">Giá sau CK trước (Gồm VAT)</option><option value="before-vat">Giá sau CK trước (Chưa VAT)</option></select></td><td><input type="number" class="ex-value" step="0.1"></td><td><button class="btn-remove" onclick="this.closest('tr').remove()">X</button></td></tr>`;
        document.getElementById('extra-body').insertAdjacentHTML('beforeend', row);
    }
    function addCustomRow() {
        const row = `<tr><td><input type="text" class="c-name" placeholder="Lý do..."></td><td><input type="number" class="c-rate" value="0" step="0.1"></td><td><button class="btn-remove" onclick="this.closest('tr').remove()">X</button></td></tr>`;
        document.getElementById('custom-body').insertAdjacentHTML('beforeend', row);
    }

    function saveState() {
        // Lưu lại toàn bộ form input vào LocalStorage
        let autoRows = Array.from(document.querySelectorAll('#extra-body tr')).map(tr => ({
            type: tr.querySelector('.ex-type').value,
            base: tr.querySelector('.ex-base').value,
            val: tr.querySelector('.ex-value').value
        }));
        let customRows = Array.from(document.querySelectorAll('#custom-body tr')).map(tr => ({
            name: tr.querySelector('.c-name').value,
            rate: tr.querySelector('.c-rate').value
        }));
        let state = {
            fullname: document.getElementById('fullname').value,
            aptCode: document.getElementById('apt-code').value,
            depDate: document.getElementById('deposit-date').value,
            plan: document.getElementById('payment-plan').value,
            mode: document.querySelector('input[name="calc-mode"]:checked').value,
            enableExtra: document.getElementById('enable-extra').checked,
            autoRows, customRows
        };
        localStorage.setItem('index1State', JSON.stringify(state));
    }

    function restoreState() {
        let s = localStorage.getItem('index1State');
        if(!s) return; // Nếu truy cập lần đầu thì bỏ qua
        let state = JSON.parse(s);
        
        document.getElementById('fullname').value = state.fullname || '';
        document.getElementById('apt-code').value = state.aptCode || '';
        if(state.depDate) document.getElementById('deposit-date').value = state.depDate;
        document.getElementById('payment-plan').value = state.plan || '36';

        document.querySelector(`input[name="calc-mode"][value="${state.mode}"]`).checked = true;
        toggleMode();
        document.getElementById('enable-extra').checked = state.enableExtra;
        toggleExtraDetails();

        document.getElementById('extra-body').innerHTML = '';
        state.autoRows.forEach(r => {
            addExtraRow();
            let lastTr = document.querySelector('#extra-body tr:last-child');
            lastTr.querySelector('.ex-type').value = r.type;
            handleExTypeChange(lastTr.querySelector('.ex-type'));
            lastTr.querySelector('.ex-base').value = r.base;
            lastTr.querySelector('.ex-value').value = r.val;
        });

        document.getElementById('custom-body').innerHTML = '';
        state.customRows.forEach(r => {
            addCustomRow();
            let lastTr = document.querySelector('#custom-body tr:last-child');
            lastTr.querySelector('.c-name').value = r.name;
            lastTr.querySelector('.c-rate').value = r.rate;
        });

        // Nếu có mã căn thì tự động bấm tính
        if (state.aptCode) calculate();
    }

    function calculate() {
        const codeInput = document.getElementById('apt-code').value.toUpperCase().trim();
        const apt = masterData.find(item => String(item.ma_can || item.Ma_can).toUpperCase().trim() === codeInput);
        if (!apt) return alert("Không tìm thấy mã căn!");

        const originalPrice = cleanAndParsePrice(apt.Tong_gia || apt.Tong_Gia);
        let currentPrice = originalPrice;
        let breakdown = "";
        const VAT_RATE = 0.1;

        const mode = document.querySelector('input[name="calc-mode"]:checked').value;
        const plan = document.getElementById('payment-plan').value;

        if (mode === 'auto') {
            let planRate = (plan === '12') ? 0.075 : (plan === '30' ? 0.12 : 0);
            if (planRate > 0) {
                let disc = currentPrice * planRate;
                breakdown += `• CK PTTT: <strong>-${new Intl.NumberFormat('vi-VN').format(disc)}đ</strong><br>`;
                currentPrice -= disc;
            }

            if (document.getElementById('enable-extra').checked) {
                const rows = document.querySelectorAll('#extra-body tr');
                rows.forEach((row) => {
                    const type = row.querySelector('.ex-type').value;
                    const base = row.querySelector('.ex-base').value;
                    const val = parseFloat(row.querySelector('.ex-value').value) || 0;
                    if (val > 0) {
                        if (type === 'amount') {
                            breakdown += `• CK bổ sung tiền mặt: <strong>-${new Intl.NumberFormat('vi-VN').format(val)}đ</strong><br>`;
                            currentPrice -= val;
                        } else {
                            let refPrice = (base === 'before-vat') ? (currentPrice / (1 + VAT_RATE)) : currentPrice;
                            let extraDisc = refPrice * (val / 100);
                            breakdown += `• CK bổ sung (${val}%): <strong>-${new Intl.NumberFormat('vi-VN').format(extraDisc)}đ</strong><br>`;
                            currentPrice -= extraDisc;
                        }
                    }
                });
            }
        } else {
            const rows = document.querySelectorAll('#custom-body tr');
            rows.forEach((row) => {
                const n = row.querySelector('.c-name').value;
                const r = (parseFloat(row.querySelector('.c-rate').value) || 0) / 100;
                if (r > 0) {
                    let disc = currentPrice * r;
                    breakdown += `• ${n || 'Chiết khấu'}: <strong>-${new Intl.NumberFormat('vi-VN').format(disc)}đ</strong><br>`;
                    currentPrice -= disc;
                }
            });
        }

        currentPrice = Math.round(currentPrice / 1000) * 1000;
        document.getElementById('out-price-total').innerText = new Intl.NumberFormat('vi-VN').format(originalPrice) + "đ";
        document.getElementById('out-price-final').innerText = new Intl.NumberFormat('vi-VN').format(currentPrice) + "đ";
        document.getElementById('out-name').innerText = document.getElementById('fullname').value || "Khách hàng";
        document.getElementById('out-code').innerText = apt.ma_can || apt.Ma_can;
        document.getElementById('out-area').innerText = apt.Dien_tich || "0";
        document.getElementById('discount-breakdown').innerHTML = breakdown || "<i>Không có chiết khấu</i>";

        renderSchedule(plan, currentPrice, document.getElementById('deposit-date').value);
        saveState(); // Lưu trạng thái hiện tại
        
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('btn-goto-index2').style.display = 'inline-flex';
    }

    function renderSchedule(plan, finalPrice, depDate) {
        const d = new Date(depDate);
        let gap = 6; 
        
        // Mô phỏng số tháng chờ GCN dựa theo PTTT
        if (plan === '30') {
            d.setDate(d.getDate() + 30);
            gap = 1; // Nhận nhà ngay, 1 tháng sau nhận sổ
        } else if (plan === '12') {
            d.setDate(d.getDate() + 180); // Đạt 50% ở tháng thứ 6
            gap = 6; // Chờ 6 tháng nữa để đóng đợt cuối
        } else {
            d.setDate(d.getDate() + 480); // Đạt 50% ở tháng 16
            gap = 20; // Chờ tới tháng 36
        }
        
        handoverInfo = { month: d.getMonth() + 1, year: d.getFullYear(), gapToGCN: gap };
        document.getElementById('schedule-content').innerHTML = "<p style='font-style:italic; color:#666'>* Tiến độ thanh toán đã được tạo thành công.</p>";
    }

    function transferToIndex2() {
        const originalPrice = cleanAndParsePrice(document.getElementById('out-price-total').innerText);
        const finalPrice = cleanAndParsePrice(document.getElementById('out-price-final').innerText);
        
        const data = {
            giaNiemYet: originalPrice,
            tongCK: originalPrice - finalPrice, // Chuyển số thực, không chuyển chuỗi
            thangBG: handoverInfo.month,
            namBG: handoverInfo.year,
            thangChoGCN: handoverInfo.gapToGCN
        };
        localStorage.setItem('dataStep1', JSON.stringify(data));
        window.location.href = './index2.html';
    }
</script>
</body>
</html>
